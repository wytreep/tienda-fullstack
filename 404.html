<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f3f4f6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        .codigo {
            font-size: 8rem;
            font-weight: 700;
            color: #2563eb;
            line-height: 1;
        }
        h1 {
            font-size: 1.5rem;
            color: #222;
            margin: 1rem 0 0.5rem;
        }
        p {
            color: #888;
            margin-bottom: 2rem;
        }
        a {
            background: #2563eb;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: background 0.2s;
        }
        a:hover { background: #1d4ed8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="codigo">404</div>
        <h1>Página no encontrada</h1>
        <p>La página que buscas no existe o fue movida.</p>
        <a href="/src/views/index.html">← Volver a la tienda</a>

</html>
