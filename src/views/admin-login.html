<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Tienda</title>
    <link rel="stylesheet" href="/src/css/login.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-orbs">
        <div class="orb orb-1" style="background:#4f46e5"></div>
        <div class="orb orb-2" style="background:#7c3aed"></div>
        <div class="orb orb-3" style="background:#1d4ed8"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo-container">
                <div style="font-size:2.5rem; margin-bottom:0.75rem;">⚙️</div>
                <div class="login-title">Panel Admin</div>
                <div class="login-subtitle">Acceso restringido a administradores</div>
            </div>

            <form class="login-form" id="adminLoginForm">
                <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
                <input type="password" id="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Entrar al panel</button>
            </form>

            <div class="register-link">
                <a href="/src/views/login.html">← Volver al login de usuarios</a>
            </div>
        </div>
    </div>

    <button class="btn-darkmode-login" id="btnDarkModeLogin">🌙</button>
    <script src="/src/js/darkmode-login.js"></script>
    <script src="/src/js/admin-login.js"></script>
</body>
</html>
