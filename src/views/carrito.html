<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/carrito.css">
    <link rel="stylesheet" href="/src/css/darkmode.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/src/views/index.html" class="nav-logo">Tienda</a>
            <div class="nav-acciones">
                <button class="btn-darkmode" id="btnDarkMode">🌙</button>
                <a href="/src/views/carrito.html" class="btn-carrito">
                    🛒 <span id="contadorCarrito">0</span>
                </a>
                <div class="perfil-menu">
                    <button class="btn-perfil" id="btnPerfil">
                        <span id="nombreUsuario"></span> ▾
                    </button>
                    <div class="perfil-dropdown" id="perfilDropdown">
                        <a href="/src/views/mis-pedidos.html">Mis pedidos</a>
                        <a href="#" id="btnCambiarCuenta">Cambiar cuenta</a>
                        <a href="#" id="btnCambiarPassword">Cambiar contraseña</a>
                        <a href="/src/views/configuracion.html">⚙️ Configuración</a>
                        <a href="#" id="btnCerrarSesion">Cerrar sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main">
        <a href="/src/views/index.html" class="btn-volver">← Seguir comprando</a>
        <h1 class="page-title">Tu carrito</h1>
        <div class="carrito-container">
            <div class="carrito-items" id="carritoItems"></div>
            <div class="carrito-resumen" id="carritoResumen"></div>
        </div>
    </main>

    <div class="modal-overlay" id="modalCuentas">
        <div class="modal">
            <h3>Cambiar cuenta</h3>
            <div id="listaCuentasModal" style="margin: 1rem 0;"></div>
            <div class="modal-botones">
                <button class="btn-cancelar" id="btnCancelarCuentas">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalDireccion">
    <div class="modal" style="max-width:540px; max-height:90vh; overflow-y:auto">
        <h3>Datos de envío</h3>

        <div style="display:flex; gap:0.75rem; margin-bottom:1rem">
            <button class="btn-tipo-envio activo" id="btnNacional" onclick="cambiarTipoEnvio('nacional')">🚚 Nacional</button>
            <button class="btn-tipo-envio" id="btnLocal" onclick="cambiarTipoEnvio('local')">🏠 Local</button>
        </div>

        <div class="form-group">
            <label>Nombre del destinatario</label>
            <input type="text" id="envDestinatario" placeholder="Nombre completo">
        </div>
        <div class="form-group">
            <label>Cédula</label>
            <input type="text" id="envCedula" placeholder="Número de cédula">
        </div>
        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" id="envTelefono" placeholder="Número de contacto">
        </div>

        <div id="camposNacional">
            <div class="form-group">
                <label>Departamento</label>
                <input type="text" id="envDepartamento" placeholder="Ej: Valle del Cauca">
            </div>
            <div class="form-group">
                <label>Ciudad / Municipio</label>
                <input type="text" id="envCiudad" placeholder="Ej: Cali">
            </div>
        </div>

        <div class="form-group">
            <label>Barrio</label>
            <input type="text" id="envBarrio" placeholder="Nombre del barrio">
        </div>
        <div class="form-group">
            <label>Dirección</label>
            <input type="text" id="envDireccion" placeholder="Ej: Calle 5 # 10-20">
        </div>
        <div class="form-group">
            <label>Indicaciones adicionales <span style="color:#aaa;font-weight:400">(opcional)</span></label>
            <textarea id="envIndicaciones" rows="2" placeholder="Ej: Casa azul, portón negro..."></textarea>
        </div>

        <div class="modal-botones" style="gap:0.75rem">
            <button class="btn-cancelar" id="btnCancelarDireccion">Cancelar</button>
            <button id="btnConfirmarPedido" onclick="confirmarPedido()">Confirmar pedido</button>
        </div>
    </div>
</div>

    <script src="/src/js/darkmode.js"></script>
    <script src="/src/js/carrito.js"></script>
</body>
</html>
