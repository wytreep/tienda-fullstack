<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/carrito.css">
    <link rel="stylesheet" href="/src/css/darkmode.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/src/views/index.html" class="nav-logo">Tienda</a>
            <div class="nav-acciones">
                <button class="btn-darkmode" id="btnDarkMode">🌙</button>
                <a href="/src/views/configuracion.html">⚙️ Configuración</a>
                <a href="/src/views/carrito.html" class="btn-carrito">
                    🛒 <span id="contadorCarrito">0</span>
                </a>
                <div class="perfil-menu">
                    <button class="btn-perfil" id="btnPerfil">
                        <span id="nombreUsuario"></span> ▾
                    </button>
                    <div class="perfil-dropdown" id="perfilDropdown">
                        <a href="/src/views/mis-pedidos.html">Mis pedidos</a>
                        <a href="#" id="btnCambiarCuenta">Cambiar cuenta</a>
                        <a href="#" id="btnCambiarPassword">Cambiar contraseña</a>
                        <a href="#" id="btnCerrarSesion">Cerrar sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main">
        <a href="/src/views/index.html" class="btn-volver">← Seguir comprando</a>
        <h1 class="page-title">Tu carrito</h1>
        <div class="carrito-container">
            <div class="carrito-items" id="carritoItems"></div>
            <div class="carrito-resumen" id="carritoResumen"></div>
        </div>
    </main>

    <div class="modal-overlay" id="modalCuentas">
        <div class="modal">
            <h3>Cambiar cuenta</h3>
            <div id="listaCuentasModal" style="margin: 1rem 0;"></div>
            <div class="modal-botones">
                <button class="btn-cancelar" id="btnCancelarCuentas">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="/src/js/darkmode.js"></script>
    <script src="/src/js/carrito.js"></script>
</body>
</html>
