<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos</title>
    <link rel="stylesheet" href="/src/css/styles.css">
    <link rel="stylesheet" href="/src/css/mis-pedidos.css">
    <link rel="stylesheet" href="/src/css/darkmode.css">
</head>
<body>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="/src/views/index.html" class="nav-logo">Tienda</a>
            <div class="nav-acciones">
                <button class="btn-darkmode" id="btnDarkMode">🌙</button>
                <a href="/src/views/carrito.html" class="btn-carrito">
                    🛒 <span id="contadorCarrito">0</span>
                </a>
                <div class="perfil-menu">
                    <button class="btn-perfil" id="btnPerfil">
                        <span id="nombreUsuario"></span> ▾
                    </button>
                    <div class="perfil-dropdown" id="perfilDropdown">
                        <a href="/src/views/mis-pedidos.html">Mis pedidos</a>
                        <a href="#" id="btnCambiarCuenta">Cambiar cuenta</a>
                        <a href="#" id="btnCambiarPassword">Cambiar contraseña</a>
                        <a href="/src/views/configuracion.html">⚙️ Configuración</a>
                        <a href="#" id="btnCerrarSesion">Cerrar sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="main">
        <a href="/src/views/index.html" class="btn-volver">← Seguir comprando</a>
        <h1 class="page-title">Mis Pedidos</h1>
        <div id="listaPedidos"></div>
    </main>

    <div class="modal-overlay" id="modalCuentas">
        <div class="modal">
            <h3>Cambiar cuenta</h3>
            <div id="listaCuentasModal" style="margin: 1rem 0;"></div>
            <div class="modal-botones">
                <button class="btn-cancelar" id="btnCancelarCuentas">Cancelar</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalCancelar">
        <div class="modal">
            <div style="text-align:center; margin-bottom:1rem">
                <div style="font-size:2.5rem">❌</div>
                <h3 style="margin-top:0.5rem">Cancelar pedido</h3>
                <p style="color:#888; font-size:0.9rem; margin-top:0.5rem">¿Estás seguro que quieres cancelar este pedido? Esta acción no se puede deshacer.</p>
            </div>
            <div class="modal-botones" style="gap:0.75rem">
                <button class="btn-cancelar" id="btnNoCancelar" style="flex:1">No, mantener</button>
                <button id="btnSiCancelar" style="flex:1; padding:10px; background:#ef4444; color:#fff; border:none; border-radius:10px; font-weight:600; cursor:pointer">Sí, cancelar</button>
            </div>
        </div>
    </div>

    <script src="/src/js/darkmode.js"></script>
    <script src="/src/js/mis-pedidos.js"></script>
</body>
</html>
