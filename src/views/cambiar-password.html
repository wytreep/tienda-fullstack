<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar Contraseña</title>
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
    <div class="login-container">
        <div class="login-title">Cambiar Contraseña</div>
        <form class="login-form" id="cambiarForm">
            <input type="password" name="passwordActual" placeholder="Contraseña actual" required>
            <input type="password" name="passwordNueva" placeholder="Nueva contraseña" required>
            <input type="password" name="confirmar" placeholder="Confirmar nueva contraseña" required>
            <button type="submit">Guardar cambios</button>
        </form>
        <div class="register-link">
            <a href="/src/views/index.html">← Volver</a>
        </div>
    </div>
    <script src="../js/cambiar-password.js"></script>
    <script src="../js/darkmode.js"></script>
</body>
</html>
