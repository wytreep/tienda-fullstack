<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cambiar contraseña - Tienda</title>
    <link rel="stylesheet" href="/src/css/login.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo-container">
                <div style="font-size:2.5rem; margin-bottom:0.75rem;">🔑</div>
                <div class="login-title">Cambiar contraseña</div>
                <div class="login-subtitle">Actualiza tu contraseña de acceso</div>
            </div>

            <form class="login-form" id="cambiarForm">
                <input type="password" name="passwordActual" placeholder="Contraseña actual" required>
                <input type="password" name="passwordNueva" placeholder="Nueva contraseña" required>
                <input type="password" name="confirmar" placeholder="Confirmar nueva contraseña" required>
                <button type="submit">Guardar cambios</button>
            </form>

            <div class="register-link">
                <a href="/src/views/index.html">← Volver a la tienda</a>
            </div>
        </div>
    </div>

    <button class="btn-darkmode-login" id="btnDarkModeLogin">🌙</button>
    <script src="/src/js/darkmode-login.js"></script>
    <script src="/src/js/cambiar-password.js"></script>
</body>
</html>
