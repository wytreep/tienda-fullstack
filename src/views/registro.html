<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Tienda Online</title>
   <link rel="stylesheet" href="/src/css/registro.css">
</head>
<body>
    <div class="container">
        <h1>Crear Cuenta</h1>
        <form id="registroForm">
            <div class="form-group">
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="contraseña">Contraseña</label>
                <input type="password" id="contraseña" name="password" required>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <div class="link-container">
            <p>¿Ya tienes cuenta? <a href="/src/views/login.html">Volver al login</a></p>
        </div>
    </div>
    <script src="/src/js/registro.js"></script>
</body>
</html>
