<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear cuenta - Tienda</title>
    <link rel="stylesheet" href="/src/css/login.css">
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="login-wrapper">
        <div class="login-container">
            <div class="logo-container">
                <img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="Logo" class="logo">
                <div class="login-title">Crear cuenta</div>
                <div class="login-subtitle">Únete a nuestra tienda</div>
            </div>

            <form class="login-form" id="registroForm">
                <input type="text" id="nombre" name="nombre" placeholder="Tu nombre completo" required>
                <input type="email" id="email" name="email" placeholder="Correo electrónico" required>
                <input type="password" id="password" name="password" placeholder="Contraseña" required>
                <button type="submit">Crear cuenta</button>
            </form>

            <div class="register-link">
                ¿Ya tienes cuenta? <a href="/src/views/login.html">Inicia sesión</a>
            </div>
        </div>
    </div>

    <button class="btn-darkmode-login" id="btnDarkModeLogin">🌙</button>
    <script src="/src/js/darkmode-login.js"></script>
    <script src="/src/js/registro.js"></script>
</body>
</html>
