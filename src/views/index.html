<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Online</title>
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <h1 class="nav-logo">Tienda Online</h1>
            <div class="nav-acciones">
                <a href="/src/views/carrito.html" class="btn-carrito">
                    🛒 Carrito <span id="contadorCarrito">0</span>
                </a>
                <div class="perfil-menu">
                    <button class="btn-perfil" id="btnPerfil">
                        <span id="nombreUsuario"></span> ▾
                    </button>
                    <div class="perfil-dropdown" id="perfilDropdown">
                        <a href="mis-pedidos.html" id="btnMisPedidos">Mis pedidos</a>
                        <a href="#" id="btnCambiarCuenta">Cambiar cuenta</a>
                        <a href="/src/views/cambiar-password.html" id="btnCambiarPassword">Cambiar contraseña</a>
                        <a href="#" id="btnCerrarSesion">Cerrar sesión</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

<main class="main">
    <div class="filtros">
        <input type="text" id="buscador" placeholder="Buscar productos...">
        <select id="filtroCategoria">
            <option value="">Todas las categorías</option>
        </select>
    </div>
    <div id="loader" class="loader-container">
    <div class="loader"></div>
    <p>Cargando productos...</p>
</div>
    <div class="productos-grid" id="productosGrid"></div>
</main>

    <div class="modal-overlay" id="modalCuentas">
        <div class="modal">
            <h3>Cambiar cuenta</h3>
            <div id="listaCuentasModal" style="margin: 1rem 0;"></div>
            <div class="modal-botones">
                <button class="btn-cancelar" id="btnCancelarCuentas">Cancelar</button>
            </div>
        </div>
    </div>

<script src="../js/app.js"></script>
</body>
</html>
