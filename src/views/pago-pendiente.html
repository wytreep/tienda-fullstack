<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago pendiente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: #fff; border-radius: 20px; padding: 48px 40px; text-align: center; max-width: 440px; width: 100%; box-shadow: 0 8px 40px rgba(13,34,71,0.12); }
        .icono { width: 80px; height: 80px; background: #fff9e6; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.4rem; margin: 0 auto 24px; }
        h1 { font-size: 24px; color: #0d2247; margin-bottom: 10px; }
        p { font-size: 14px; color: #64748b; line-height: 1.6; margin-bottom: 20px; }
        .pedido-id { background: #fff9e6; border-radius: 8px; padding: 10px 16px; font-size: 13px; color: #92400e; font-weight: 600; margin-bottom: 24px; display: inline-block; border: 1px solid #fcd34d; }
        .btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; transition: all 0.2s; }
        .btn-primary { background: #1a4480; color: #fff; }
        .btn-primary:hover { background: #0d2247; }
        .btn-secondary { background: #f0f4f9; color: #475569; }
        .btn-secondary:hover { background: #e2e8f0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icono">⏳</div>
        <h1>Pago pendiente</h1>
        <p>Tu pago está siendo procesado. Esto puede tomar unos minutos dependiendo del método de pago.</p>
        <div class="pedido-id" id="pedidoRef">Verificando...</div>
        <p>Te notificaremos por email cuando se confirme tu pago.</p>
        <div class="btns">
            <a href="/src/views/mis-pedidos.html" class="btn btn-primary">Ver mis pedidos</a>
            <a href="/src/views/index.html" class="btn btn-secondary">Volver a la tienda</a>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search)
        const ref = params.get("external_reference")
        document.getElementById("pedidoRef").textContent = ref ? "Pedido #" + ref + " — pendiente de confirmación" : "Pedido pendiente"
    </script>
</body>
</html>
