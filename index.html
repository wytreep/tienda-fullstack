<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda - Gestión de Productos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Tienda - Gestión de Productos</h1>
        
        <div class="form-section">
            <h2>Agregar Producto</h2>
            <form id="productForm">
                <div class="form-group">
                    <label for="productName">Nombre del Producto:</label>
                    <input type="text" id="productName" required placeholder="Ingrese el nombre">
                </div>
                
                <div class="form-group">
                    <label for="productPrice">Precio:</label>
                    <input type="number" id="productPrice" step="0.01" required placeholder="Ingrese el precio">
                </div>
                
                <div class="form-group">
                    <label for="productStock">Stock:</label>
                    <input type="number" id="productStock" min="0" required placeholder="Ingrese el stock">
                </div>
                
                <button type="submit" class="btn-add">Agregar Producto</button>
            </form>
        </div>

        <div class="table-section">
            <h2>Productos</h2>
            <table id="productTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Nombre</th>
                        <th>Precio ($)</th>
                        <th>Stock</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="productTableBody">
                </tbody>
            </table>
            <p id="emptyMessage" class="empty-message">No hay productos agregados aún.</p>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
